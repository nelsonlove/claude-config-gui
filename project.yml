name: ClaudeConfigGUI
options:
  bundleIdPrefix: com.nelson.claudeconfig
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  ClaudeConfigGUI:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nelson.claudeconfig.gui
        PRODUCT_NAME: Claude Config
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_GENERATION_MODE: GeneratedFile
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_APP_SANDBOX: false
        ENABLE_HARDENED_RUNTIME: true
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSMainNibFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
